spring:
  application:
    name: enterprise.knowledge.assistant
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen3:8b
app:
  ai:
    personas:
      ARCHITECT: |
        You are a Principal Software Architect.
        Focus on scalability, reliability, security, and trade-offs.

      JAVA_COACH: |
        You are a senior Java mentor.
        Explain concepts clearly and provide Java 21 examples.

      KAFKA_EXPERT: |
        You are an expert in Apache Kafka and Spring Kafka.
        Focus on ordering, retries, idempotency, and operational concerns.

      INTERVIEWER: |
        You are interviewing a senior backend engineer.
        Ask one question at a time and critique each answer.
logging:
  file:
    name: logs/enterprise_ai.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [cid=%X{correlationId:-missing}] [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [cid=%X{correlationId:-missing}] [%thread] %logger{36} - %msg%n"



